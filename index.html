<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Candu Dimsum</title>
    <style>
        /* CSS UNTUK LOGIN SCREEN */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #d32f2f; /* Warna merah dimsum */
            display: flex; /* Memastikan ini terlihat pertama kali */
            align-items: center;
            justify-content: center;
            z-index: 99999; /* Angka tertinggi agar di depan */
            font-family: sans-serif;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* MENYEMBUNYIKAN APLIKASI UTAMA SEBELUM LOGIN */
        #app-wrapper {
            display: none; 
            height: 100vh;
        }

        input {
            padding: 10px;
            width: 100%;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- SCREEN LOGIN (Akan muncul pertama kali) -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Candu Dimsum</h2>
            <p>Masukkan PIN Kasir</p>
            <input type="password" id="pin-input" placeholder="****">
            <button onclick="checkLogin()">MASUK</button>
        </div>
    </div>

    <!-- APLIKASI UTAMA (Tersembunyi) -->
    <div id="app-wrapper">
        <h2 style="padding: 20px;">Selamat Datang di Kasir</h2>
        <!-- Kode POS kamu selanjutnya di sini -->
    </div>

    <script>
        // Password sederhana untuk akses
        const PIN_BENAR = "1234";

        function checkLogin() {
            const input = document.getElementById('pin-input').value;
            
            if (input === PIN_BENAR) {
                // Sembunyikan login, tampilkan aplikasi
                document.getElementById('login-screen').style.setProperty('display', 'none', 'important');
                document.getElementById('app-wrapper').style.display = 'block';
                console.log("Login Berhasil");
            } else {
                alert("PIN Salah! Coba lagi.");
            }
        }
    </script>
</body>
</html>
